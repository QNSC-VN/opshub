# =============================================================================
# Backend · Deploy — thin caller of the shared reusable (qnsc-ci).
#
# Triggers:
#   develop → push to main (auto)
#   prod    → push a semver tag v*.*.*  (gated by the "production" GitHub
#             Environment's required reviewer, enforced inside the reusable)
#
# The reusable builds/attests on main, promotes the exact dev image on tag,
# migrates, then rolls the ECS services. All ECS_*/RDS/APP_URL config is read
# from env-scoped GitHub vars; this caller passes only what the reusable
# declares (AWS_ACCOUNT_ID is a non-sensitive OIDC identifier → a Variable).
# =============================================================================
name: Backend · Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # semver only — no -rc suffix

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false   # never cancel a running deploy

jobs:
  deploy:
    uses: QNSC-VN/qnsc-ci/.github/workflows/backend-deploy.yml@v1.4.0
    with:
      product: opshub
      has_worker: true
      has_migrator: true
    # Least-privilege: pass only what the reusable declares (no `secrets: inherit`).
    secrets:
      AWS_ACCOUNT_ID:       ${{ vars.AWS_ACCOUNT_ID }}
      SLACK_DEPLOY_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
