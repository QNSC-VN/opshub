# =============================================================================
# CI — fast quality gates on every PR and push to main
# Gate: lint → typecheck → unit tests → e2e tests → docker build → openapi diff
# Security scans live in the Security · Scan workflow — independently runnable.
# =============================================================================
name: Backend · CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read  # required by amannn/action-semantic-pull-request
  packages: read       # pull @qnsc-vn/* from GitHub Packages

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Lint + typecheck (fast gate — no DB needed)
  # ─────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint & typecheck
    # Skip the heavy gates on PR title/body edits; build/openapi cascade-skip via `needs`.
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # pull @qnsc-vn/* from GitHub Packages

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Unit + e2e tests (needs Postgres)
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    if: github.event.action != 'edited'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opshub_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # pull @qnsc-vn/* from GitHub Packages

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opshub_test?sslmode=disable

      - name: Generate ephemeral JWT keypair for tests
        # Generates a fresh EC P-256 keypair per CI run — never reuse a static secret.
        # Keys are exported as base64-encoded PEM to $GITHUB_ENV for use in test steps.
        run: |
          node - << 'EOF'
          const { generateKeyPairSync } = require('crypto');
          const fs = require('fs');
          const { privateKey, publicKey } = generateKeyPairSync('ec', {
            namedCurve: 'P-256',
            privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
            publicKeyEncoding:  { type: 'spki',  format: 'pem' },
          });
          fs.appendFileSync(process.env.GITHUB_ENV, `CI_JWT_PRIVATE_KEY=${Buffer.from(privateKey).toString('base64')}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `CI_JWT_PUBLIC_KEY=${Buffer.from(publicKey).toString('base64')}\n`);
          console.log('JWT keypair generated');
          EOF

      - name: Unit tests (with coverage)
        run: pnpm test:cov
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opshub_test?sslmode=disable
          JWT_PRIVATE_KEY: ${{ env.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ env.CI_JWT_PUBLIC_KEY }}
          JWT_ACCESS_EXPIRY: 8h
          JWT_REFRESH_EXPIRY_DAYS: '7'
          JWT_ISSUER: opshub-api
          JWT_AUDIENCE: opshub-web
          CORS_ORIGINS: http://localhost:5173
          VALKEY_URL: redis://localhost:6379
          COOKIE_SECRET: ci-test-cookie-secret-min-32-characters-ok
          LOG_LEVEL: fatal
          OTEL_ENABLED: 'false'
          OTEL_SERVICE_NAME: opshub-api-test

      - name: E2E tests
        run: pnpm test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opshub_test?sslmode=disable
          JWT_PRIVATE_KEY: ${{ env.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ env.CI_JWT_PUBLIC_KEY }}
          JWT_ACCESS_EXPIRY: 8h
          JWT_REFRESH_EXPIRY_DAYS: '7'
          JWT_ISSUER: opshub-api
          JWT_AUDIENCE: opshub-web
          CORS_ORIGINS: http://localhost:5173
          VALKEY_URL: redis://localhost:6379
          COOKIE_SECRET: ci-test-cookie-secret-min-32-characters-ok
          LOG_LEVEL: fatal
          OTEL_ENABLED: 'false'
          OTEL_SERVICE_NAME: opshub-api-test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Docker build validation (BuildKit cache, no push)
  #    Runs after tests to avoid wasting compute on broken code.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [quality, test]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - name: Build api image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          target: api
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}

      - name: Build migrator image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          target: migrator
          push: false
          cache-from: type=gha,scope=migrator
          cache-to: type=gha,mode=max,scope=migrator
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}

      - name: Build worker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          target: worker
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # 4. OpenAPI spec — generate and check for breaking changes on PRs.
  #    Publishes the spec as an artifact so the FE repo can download it.
  # ─────────────────────────────────────────────────────────────────────────
  openapi:
    name: OpenAPI contract
    runs-on: ubuntu-latest
    needs: [quality]
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: opshub_openapi
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 5s --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - uses: QNSC-VN/qnsc-ci/actions/setup-node-pnpm@v1.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # pull @qnsc-vn/* from GitHub Packages

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opshub_openapi?sslmode=disable

      - name: Generate ephemeral JWT keypair
        run: |
          node - << 'EOF'
          const { generateKeyPairSync } = require('crypto');
          const fs = require('fs');
          const { privateKey, publicKey } = generateKeyPairSync('ec', {
            namedCurve: 'P-256',
            privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
            publicKeyEncoding:  { type: 'spki',  format: 'pem' },
          });
          fs.appendFileSync(process.env.GITHUB_ENV, `CI_JWT_PRIVATE_KEY=${Buffer.from(privateKey).toString('base64')}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `CI_JWT_PUBLIC_KEY=${Buffer.from(publicKey).toString('base64')}\n`);
          EOF

      - name: Build api
        run: pnpm build:api

      - name: Start API and capture OpenAPI spec
        run: |
          node dist/apps/api/apps/api/src/main.js &
          API_PID=$!
          echo "API_PID=$API_PID" >> "$GITHUB_ENV"
          # Poll until ready (max 30s)
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/healthz && break || sleep 1
          done
          curl -sf http://localhost:3000/api/docs-json -o openapi.json
          kill "$API_PID" || true
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/opshub_openapi?sslmode=disable
          JWT_PRIVATE_KEY: ${{ env.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ env.CI_JWT_PUBLIC_KEY }}
          JWT_ACCESS_EXPIRY: 8h
          JWT_ISSUER: opshub-api
          JWT_AUDIENCE: opshub-web
          CORS_ORIGINS: http://localhost:5173
          VALKEY_URL: redis://localhost:6379
          COOKIE_SECRET: ci-test-cookie-secret-min-32-characters-ok
          JWT_REFRESH_EXPIRY_DAYS: '7'
          LOG_LEVEL: fatal
          OTEL_ENABLED: 'false'
          OTEL_SERVICE_NAME: opshub-api

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: openapi-spec-${{ github.sha }}
          path: openapi.json
          retention-days: 30

      # On PRs: download the base-branch spec and diff for breaking changes.
      - name: Download base spec
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151  # v21
        continue-on-error: true   # first PR has no base artifact yet
        with:
          workflow: backend-ci.yml
          branch: ${{ github.base_ref }}
          name: openapi-spec-${{ github.event.pull_request.base.sha }}
          path: base-spec/

      - name: Check for breaking API changes (PR only)
        if: github.event_name == 'pull_request'
        uses: QNSC-VN/qnsc-ci/actions/validate-openapi-contract@v1.4.0
        with:
          current-spec-path: openapi.json
          base-spec-path: base-spec/openapi.json
          fail-on-breaking: "true"

  # ─────────────────────────────────────────────────────────────────────────
  # 5. PR title lint — enforce Conventional Commits format on the PR title.
  #    Release Please reads PR titles to generate changelogs, so this gate
  #    ensures the title is machine-readable before the PR can merge.
  # ─────────────────────────────────────────────────────────────────────────
  pr-title:
    name: PR title (conventional commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            security
            test
            build
            ci
            deps
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.
