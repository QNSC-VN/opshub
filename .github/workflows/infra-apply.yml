# =============================================================================
# OpenTofu Apply — applies after merge to main.
# Shared → develop → prod (prod requires GitHub Environment approval).
# =============================================================================
name: OpenTofu Apply

on:
  push:
    branches: [main]
    paths:
      - "infra/live/**"
      - ".github/workflows/infra-apply.yml"

permissions:
  id-token: write
  contents: read

env:
  TOFU_VERSION: "1.9.1"
  AWS_REGION: ap-southeast-1

jobs:
  apply-shared:
    runs-on: ubuntu-latest
    environment: shared
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1.5
        with:
          role-arn:     arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/opshub-github-infra-apply
          aws-region:   ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: tofu init
        working-directory: infra/live/_shared
        run: tofu init -input=false

      - name: tofu validate
        working-directory: infra/live/_shared
        run: tofu validate

      - name: tofu apply
        working-directory: infra/live/_shared
        run: tofu apply -input=false -auto-approve

  apply-develop:
    needs: apply-shared
    runs-on: ubuntu-latest
    environment: develop
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1.5
        with:
          role-arn:     arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/opshub-github-infra-apply
          aws-region:   ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: tofu init
        working-directory: infra/live/develop
        run: tofu init -input=false

      - name: tofu validate
        working-directory: infra/live/develop
        run: tofu validate

      - name: tofu apply
        working-directory: infra/live/develop
        run: tofu apply -input=false -auto-approve
        env:
          TF_VAR_acm_cert_arn:          ${{ secrets.ACM_CERT_ARN_DEVELOP }}
          TF_VAR_image_tag:             ${{ vars.DEFAULT_IMAGE_TAG || 'latest' }}
          TF_VAR_entra_tenant_id:       ${{ vars.ENTRA_TENANT_ID }}
          TF_VAR_entra_client_id:       ${{ vars.ENTRA_CLIENT_ID }}
          TF_VAR_cloudflare_api_token:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Mint a short-lived token from the RELEASE_BOT GitHub App (same app
      # release.yml uses) to publish the Pages project name into the develop
      # environment variables the web-deploy workflow reads. No PAT needed.
      - uses: actions/create-github-app-token@v1
        id: app-token
        if: ${{ vars.RELEASE_BOT_APP_ID != '' }}
        continue-on-error: true
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Publish PAGES_PROJECT to develop environment variables
        if: ${{ steps.app-token.outputs.token != '' }}
        continue-on-error: true
        working-directory: infra/live/develop
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh variable set PAGES_PROJECT --env develop --repo "$REPO" --body "$(tofu output -raw web_pages_project)"

  apply-prod:
    needs: apply-develop
    runs-on: ubuntu-latest
    environment: production   # requires manual approval in GitHub Settings
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1.5
        with:
          role-arn:     arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/opshub-github-infra-apply
          aws-region:   ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: tofu init
        working-directory: infra/live/prod
        run: tofu init -input=false

      - name: tofu validate
        working-directory: infra/live/prod
        run: tofu validate

      - name: tofu apply
        working-directory: infra/live/prod
        run: tofu apply -input=false -auto-approve
        env:
          TF_VAR_acm_cert_arn:       ${{ secrets.ACM_CERT_ARN_PROD }}
          TF_VAR_web_acm_cert_arn:   ${{ secrets.WEB_ACM_CERT_ARN_PROD }}
          TF_VAR_image_tag:          ${{ vars.PINNED_IMAGE_TAG }}
          TF_VAR_entra_tenant_id:    ${{ vars.ENTRA_TENANT_ID }}
          TF_VAR_entra_client_id:    ${{ vars.ENTRA_CLIENT_ID }}
