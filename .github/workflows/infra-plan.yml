# =============================================================================
# OpenTofu Plan — thin caller over the shared reusable tofu-plan workflow.
# Logic (detect changed workspaces → matrix plan → PR comment) lives in
# QNSC-VN/qnsc-ci/.github/workflows/tofu-plan.yml. Read-only; assumes the
# opshub-github-infra-plan role. Product-specific TF_VARs are passed below.
# =============================================================================
name: OpenTofu Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/live/**"
      - ".github/workflows/infra-plan.yml"

permissions:
  id-token: write # OIDC
  contents: read
  pull-requests: write # post plan comment

jobs:
  plan:
    uses: QNSC-VN/qnsc-ci/.github/workflows/tofu-plan.yml@v1
    with:
      product: opshub
      tf_vars_json: '{"image_tag": "${{ vars.DEFAULT_IMAGE_TAG || ''latest'' }}"}'
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      tf_secret_vars_json: '{"acm_cert_arn": "${{ secrets.ACM_CERT_ARN }}", "web_acm_cert_arn": "${{ secrets.WEB_ACM_CERT_ARN }}"}'
