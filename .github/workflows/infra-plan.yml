# =============================================================================
# OpenTofu Plan — dry-run on every PR targeting main.
# Posts a plan comment per changed workspace directly on the PR.
# =============================================================================
name: OpenTofu Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/live/**"
      - ".github/workflows/infra-plan.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TOFU_VERSION: "1.9.1"
  AWS_REGION: ap-southeast-1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      workspaces: ${{ steps.set.outputs.workspaces }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with: { fetch-depth: 0 }

      - id: set
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^infra/live/' \
            | cut -d/ -f1-3 \
            | sort -u \
            | jq -Rc '[.,inputs]' \
            | jq -sc 'add // []')
          echo "workspaces=$CHANGED" >> $GITHUB_OUTPUT

  plan:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.workspaces != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJson(needs.detect-changes.outputs.workspaces) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: QNSC-VN/qnsc-ci/actions/setup-tofu-aws@v1
        with:
          role-arn:     arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/opshub-github-infra-plan
          aws-region:   ${{ env.AWS_REGION }}
          tofu-version: ${{ env.TOFU_VERSION }}

      - name: tofu init
        working-directory: ${{ matrix.workspace }}
        run: tofu init -input=false

      - name: tofu validate
        working-directory: ${{ matrix.workspace }}
        run: tofu validate

      - name: tofu plan
        id: plan
        working-directory: ${{ matrix.workspace }}
        run: |
          # The infra-plan OIDC role is read-only and has no DynamoDB write
          # permission, so it cannot acquire the state lock. Plan never mutates
          # state, so run lock-free (apply still locks via the admin apply role).
          tofu plan -input=false -lock=false -no-color -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          TF_VAR_acm_cert_arn:         ${{ vars.ACM_CERT_ARN_DEVELOP }}
          TF_VAR_web_acm_cert_arn:     ${{ secrets.WEB_ACM_CERT_ARN }}
          TF_VAR_image_tag:            ${{ vars.DEFAULT_IMAGE_TAG || 'latest' }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true   # allow comment step to run; real failure gate below

      - name: Post plan comment
        if: always()   # post even when plan fails so PR shows the error
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3   # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ matrix.workspace }}/plan.txt', 'utf8');
            const workspace = '${{ matrix.workspace }}';
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            const body = `### OpenTofu Plan — \`${workspace}\`\n\`\`\`hcl\n${truncated}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != '2'
        run: exit 1
